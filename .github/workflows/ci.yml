name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: gofmt check
        run: |
          FILES="$(git ls-files '*.go')"
          test -z "$(gofmt -l $FILES)" || (echo "Please run gofmt"; gofmt -l $FILES; exit 1)

      - name: go vet
        run: go vet ./benchmark ./matching ./ledger ./risk ./indexer ./services/...

      - name: Go tests
        run: go test ./benchmark ./matching ./ledger ./risk ./indexer ./services/... -v

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-modern
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-modern/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Frontend invariants
        run: npm run test:invariants

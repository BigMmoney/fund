<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#07162c"/>
  <text x="40" y="50" fill="#f4f7fb" font-size="28" font-family="Segoe UI, Arial">Figure 5. Batch-Window Sensitivity: Throughput vs p50 Latency</text>
  <line x1="120" y1="470" x2="1120" y2="470" stroke="#8fb6dc" stroke-width="3"/>
  <line x1="120" y1="110" x2="120" y2="470" stroke="#8fb6dc" stroke-width="3"/>
  <g fill="#8fb6dc" font-size="18" font-family="Segoe UI, Arial">
    <text x="100" y="490">0</text>
    <text x="330" y="490">160</text>
    <text x="565" y="490">320</text>
    <text x="800" y="490">480</text>
    <text x="20" y="475">0</text>
    <text x="20" y="355">2k</text>
    <text x="20" y="235">4k</text>
    <text x="12" y="115">6k</text>
  </g>
  <polyline fill="none" stroke="#67d5ff" stroke-width="4" points="302,171 571,366 824,420"/>
  <circle cx="302" cy="171" r="10" fill="#67d5ff"/>
  <circle cx="571" cy="366" r="10" fill="#67d5ff"/>
  <circle cx="824" cy="420" r="10" fill="#67d5ff"/>
  <g fill="#f4f7fb" font-size="18" font-family="Segoe UI, Arial">
    <text x="260" y="150">100ms</text>
    <text x="528" y="345">250ms</text>
    <text x="782" y="399">500ms</text>
  </g>
  <text x="360" y="530" fill="#8fb6dc" font-size="20" font-family="Segoe UI, Arial">p50 latency (ms)</text>
  <text x="40" y="80" fill="#8fb6dc" font-size="20" font-family="Segoe UI, Arial">orders/s</text>
  <text x="40" y="520" fill="#8fb6dc" font-size="18" font-family="Segoe UI, Arial">Under this workload, larger batch windows produce a smooth and monotonic latency/throughput tradeoff.</text>
</svg>

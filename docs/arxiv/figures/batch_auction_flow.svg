<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#07162c"/>
  <text x="40" y="50" fill="#f4f7fb" font-size="28" font-family="Segoe UI, Arial">Figure 2. Batch Auction Flow</text>
  <g font-family="Segoe UI, Arial" font-size="20" fill="#f4f7fb" text-anchor="middle">
    <rect x="50" y="170" width="190" height="70" rx="16" fill="#102a4a" stroke="#67d5ff"/><text x="145" y="213">Collect valid</text><text x="145" y="238">intents</text>
    <rect x="280" y="170" width="190" height="70" rx="16" fill="#102a4a" stroke="#67d5ff"/><text x="375" y="213">Group by</text><text x="375" y="238">market/outcome</text>
    <rect x="510" y="170" width="190" height="70" rx="16" fill="#13385b" stroke="#ffd166"/><text x="605" y="213">Compute</text><text x="605" y="238">clearing price</text>
    <rect x="740" y="170" width="190" height="70" rx="16" fill="#102a4a" stroke="#77e19d"/><text x="835" y="213">Allocate fills</text><text x="835" y="238">exactly</text>
    <rect x="970" y="170" width="180" height="70" rx="16" fill="#0f2845" stroke="#c6d3ff"/><text x="1060" y="213">Emit fills /</text><text x="1060" y="238">ledger deltas</text>
  </g>
  <g stroke-width="4">
    <line x1="240" y1="205" x2="280" y2="205" stroke="#67d5ff"/><polygon points="280,205 264,196 264,214" fill="#67d5ff"/>
    <line x1="470" y1="205" x2="510" y2="205" stroke="#ffd166"/><polygon points="510,205 494,196 494,214" fill="#ffd166"/>
    <line x1="700" y1="205" x2="740" y2="205" stroke="#77e19d"/><polygon points="740,205 724,196 724,214" fill="#77e19d"/>
    <line x1="930" y1="205" x2="970" y2="205" stroke="#c6d3ff"/><polygon points="970,205 954,196 954,214" fill="#c6d3ff"/>
  </g>
  <text x="40" y="360" fill="#8fb6dc" font-size="18" font-family="Segoe UI, Arial">The staged pipeline is the paper's method: batch collection, deterministic price selection, exact allocation, then settlement preparation.</text>
</svg>

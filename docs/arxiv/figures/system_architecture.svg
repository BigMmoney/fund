<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520">
  <rect width="1200" height="520" fill="#07162c"/>
  <text x="40" y="50" fill="#f4f7fb" font-size="28" font-family="Segoe UI, Arial">Figure 1. System Architecture</text>
  <rect x="460" y="80" width="280" height="64" rx="14" fill="#113461" stroke="#67d5ff"/>
  <text x="540" y="120" fill="#f4f7fb" font-size="26" font-family="Segoe UI, Arial">API Gateway</text>
  <rect x="130" y="200" width="260" height="70" rx="14" fill="#102a4a" stroke="#4fc3f7"/>
  <text x="180" y="243" fill="#f4f7fb" font-size="24" font-family="Segoe UI, Arial">Matching Engine</text>
  <rect x="810" y="200" width="220" height="70" rx="14" fill="#102a4a" stroke="#77e19d"/>
  <text x="875" y="243" fill="#f4f7fb" font-size="24" font-family="Segoe UI, Arial">Risk Service</text>
  <rect x="430" y="220" width="320" height="70" rx="14" fill="#13385b" stroke="#ffd166"/>
  <text x="540" y="263" fill="#f4f7fb" font-size="24" font-family="Segoe UI, Arial">Event Bus</text>
